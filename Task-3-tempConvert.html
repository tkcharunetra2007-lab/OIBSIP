<!DOCTYPE html>
<html>
    <head>
        <title>Temperature Converter</title>
        <link rel="stylesheet" href="tempConvert.css">
    </head>

    

    <body>
        <div class="head-section">
            <h class="head">Temperature Converter</h>
        </div>
        

        <div class="box-section">
            <input class="box1 js-box1" type="number" placeholder="Enter Temperature">
        </div>


        <div class="box-section">
            <select class="box2 js-box2">
                <option>Celsius</option>
                <option>Fahrenheit</option>
                <option>Kelvin</option>
            </select>
        </div>


        <div class="box-section">
            <button class="convert-btn" onclick="tempConvert()">Convert</button>
        </div>
    

        <p class="result js-result"></p>


        <script src="tempConvert.js"></script>

    </body>

    
</html>
